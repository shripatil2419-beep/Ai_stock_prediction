<div class="loader-overlay" *ngIf="isLoading$ | async">
  <div class="loader-container fade-in">
    <p-progressSpinner [style]="{width: '70px', height: '70px'}" strokeWidth="4" animationDuration="1s"></p-progressSpinner>
    <div class="loader-text mt-4 text-primary fs-5">Loading...</div>
  </div>
</div>
